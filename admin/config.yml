backend:
  name: github
  repo: robertogrilli/da-oio
  branch: main

media_folder: "images"
public_folder: "/images"

locale: "it"

collections:
  - name: "contenuti"
    label: "Contenuti Sito / Site Content"
    files:
      - name: "hero"
        label: "Hero"
        file: "data/hero.json"
        format: "json"
        fields:
          - { name: "tagline_it", label: "Tagline (Italiano)", widget: "text" }
          - { name: "tagline_en", label: "Tagline (English)", widget: "text" }
          - { name: "since_it", label: "Sottotitolo (Italiano)", widget: "string" }
          - { name: "since_en", label: "Sottotitolo (English)", widget: "string" }

      - name: "storia"
        label: "La Storia / Our Story"
        file: "data/storia.json"
        format: "json"
        fields:
          - { name: "title_it", label: "Titolo (Italiano)", widget: "string" }
          - { name: "title_en", label: "Title (English)", widget: "string" }
          - { name: "body_it", label: "Testo (Italiano)", widget: "text" }
          - { name: "body_en", label: "Text (English)", widget: "text" }
          - { name: "quote_it", label: "Citazione (Italiano)", widget: "string" }
          - { name: "quote_en", label: "Quote (English)", widget: "string" }

      - name: "info"
        label: "Informazioni / Info"
        file: "data/info.json"
        format: "json"
        fields:
          - { name: "phone", label: "Telefono", widget: "string" }
          - { name: "address", label: "Indirizzo", widget: "string" }
          - { name: "instagram_url", label: "Instagram URL", widget: "string" }
          - { name: "facebook_url", label: "Facebook URL", widget: "string" }

      - name: "orari"
        label: "Orari / Hours"
        file: "data/orari.json"
        format: "json"
        fields:
          - name: "schedule"
            label: "Orari Settimanali"
            widget: "list"
            fields:
              - { name: "day_it", label: "Giorno (IT)", widget: "string" }
              - { name: "day_en", label: "Day (EN)", widget: "string" }
              - { name: "hours", label: "Orario", widget: "string" }

      - name: "recensioni"
        label: "Recensioni / Reviews"
        file: "data/recensioni.json"
        format: "json"
        fields:
          - name: "reviews"
            label: "Recensioni"
            widget: "list"
            fields:
              - { name: "author", label: "Nome Autore", widget: "string" }
              - { name: "stars", label: "Stelle (1-5)", widget: "number", value_type: "int", min: 1, max: 5 }
              - { name: "text_it", label: "Testo (IT)", widget: "text" }
              - { name: "text_en", label: "Text (EN)", widget: "text" }

      - name: "immagini"
        label: "Immagini / Images"
        file: "data/images.json"
        format: "json"
        fields:
          - { name: "logo_hero", label: "Logo Hero (sfondo scuro)", widget: "image" }
          - { name: "logo_navbar", label: "Logo Navbar", widget: "image" }
          - { name: "logo_storia", label: "Immagine sezione Storia", widget: "image" }

  - name: "menu"
    label: "Menù"
    files:
      - name: "menu_completo"
        label: "Menù Completo"
        file: "data/menu.json"
        format: "json"
        fields:
          - name: "categories"
            label: "Categorie"
            widget: "list"
            fields:
              - { name: "id", label: "ID (non cambiare)", widget: "string" }
              - { name: "name_it", label: "Nome Categoria (IT)", widget: "string" }
              - { name: "name_en", label: "Category Name (EN)", widget: "string" }
              - name: "items"
                label: "Piatti"
                widget: "list"
                fields:
                  - { name: "name", label: "Nome Piatto", widget: "string" }
                  - { name: "desc_it", label: "Descrizione (IT)", widget: "string", required: false }
                  - { name: "desc_en", label: "Description (EN)", widget: "string", required: false }
                  - { name: "price", label: "Prezzo (es: € 12)", widget: "string", required: false }
